<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Wedding Flow Studio — hand-built cinematic church interior.
       Authored art (no external assets); subtle SMIL animation: candle
       flicker, breathing light shafts, drifting dust. -->
  <defs>
    <radialGradient id="wall" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#9a8a6d"/>
      <stop offset="55%" stop-color="#7b6d54"/>
      <stop offset="100%" stop-color="#4e4433"/>
    </radialGradient>
    <linearGradient id="alcove" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ecda"/>
      <stop offset="70%" stop-color="#e9dcbe"/>
      <stop offset="100%" stop-color="#d9c9a4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6c47f"/>
      <stop offset="50%" stop-color="#c9a25c"/>
      <stop offset="100%" stop-color="#9a7940"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a97844"/>
      <stop offset="45%" stop-color="#8a5a33"/>
      <stop offset="100%" stop-color="#5e3c21"/>
    </linearGradient>
    <linearGradient id="woodEnd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e4526"/>
      <stop offset="100%" stop-color="#b07f4a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#97805c"/>
      <stop offset="30%" stop-color="#c3a97e"/>
      <stop offset="70%" stop-color="#c9ad80"/>
      <stop offset="100%" stop-color="#a68c62"/>
    </linearGradient>
    <linearGradient id="runner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7d3"/>
      <stop offset="100%" stop-color="#dfd2b3"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ea"/>
      <stop offset="100%" stop-color="#ded2b6"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4dc" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#fff4dc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff4dc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="45%" r="72%">
      <stop offset="0%" stop-color="#181209" stop-opacity="0"/>
      <stop offset="62%" stop-color="#181209" stop-opacity="0"/>
      <stop offset="100%" stop-color="#181209" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="topGrade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161109" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#161109" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomGrade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c150b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1c150b" stop-opacity="0.3"/>
    </linearGradient>
    <pattern id="lead" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M0 22 L22 0 L44 22 L22 44 Z" fill="none" stroke="#6f6552" stroke-width="1.7" opacity="0.85"/>
    </pattern>
    <filter id="b2" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="b6" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="b14" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="b24" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.4 0 0 0 0 0.32 0 0 0 0.05 0"/><feComposite operator="over" in2="SourceGraphic"/></filter>

    <g id="pew">
      <ellipse cx="390" cy="102" rx="392" ry="15" fill="#1d1406" opacity="0.32" filter="url(#b6)"/>
      <polygon points="10,62 750,62 772,95 32,95" fill="#5f3c22"/>
      <rect x="0" y="0" width="760" height="64" rx="4" fill="url(#wood)" stroke="#482e18" stroke-width="1"/>
      <rect x="0" y="0" width="760" height="4.5" rx="2" fill="#cf9a5e" opacity="0.4"/>
      <g stroke="#4a2f18" stroke-width="2" opacity="0.35">
        <line x1="152" y1="9" x2="152" y2="58"/>
        <line x1="304" y1="9" x2="304" y2="58"/>
        <line x1="456" y1="9" x2="456" y2="58"/>
        <line x1="608" y1="9" x2="608" y2="58"/>
      </g>
      <rect x="738" y="-8" width="30" height="106" rx="4" fill="url(#woodEnd)" stroke="#482e18" stroke-width="1"/>
    </g>

    <g id="flame">
      <circle r="17" fill="#ffb95e" opacity="0.22" filter="url(#b6)">
        <animate attributeName="opacity" values="0.22;0.3;0.18;0.26;0.22" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <ellipse cy="1" rx="5.5" ry="10.5" fill="#ffcf8f" opacity="0.6" filter="url(#b2)">
        <animate attributeName="ry" values="10.5;12;9.5;11;10.5" dur="2.3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="3.2" ry="6.6" fill="#fff3d6"/>
    </g>

    <g id="posy">
      <ellipse cx="-24" cy="8" rx="13" ry="6" fill="#75865f" transform="rotate(-28 -24 8)"/>
      <ellipse cx="24" cy="11" rx="12" ry="5.5" fill="#66775a" transform="rotate(24 24 11)"/>
      <ellipse cx="2" cy="-17" rx="11" ry="4.5" fill="#83936c" transform="rotate(78 2 -17)"/>
      <circle cx="0" cy="0" r="15" fill="#f3ecdc"/>
      <circle cx="-13" cy="6" r="11" fill="#e9dcc6"/>
      <circle cx="12" cy="7" r="12" fill="#efe4d0"/>
      <circle cx="-3" cy="13" r="10" fill="#e2d4ba"/>
      <circle cx="18" cy="-5" r="8.5" fill="#f6f0e2"/>
      <circle cx="-16" cy="-7" r="8" fill="#ece0ca"/>
    </g>

    <g id="bouquet">
      <ellipse cx="-46" cy="16" rx="20" ry="8" fill="#6d7e58" transform="rotate(-30 -46 16)"/>
      <ellipse cx="46" cy="18" rx="19" ry="8" fill="#5f7052" transform="rotate(26 46 18)"/>
      <ellipse cx="-8" cy="-38" rx="17" ry="6.5" fill="#7b8c65" transform="rotate(70 -8 -38)"/>
      <ellipse cx="30" cy="-30" rx="15" ry="6" fill="#68795b" transform="rotate(45 30 -30)"/>
      <circle cx="0" cy="0" r="26" fill="#f3ecdc"/>
      <circle cx="-24" cy="10" r="19" fill="#e9dcc6"/>
      <circle cx="22" cy="12" r="20" fill="#efe4d0"/>
      <circle cx="-6" cy="24" r="16" fill="#e2d4ba"/>
      <circle cx="32" cy="-10" r="15" fill="#f6f0e2"/>
      <circle cx="-28" cy="-12" r="14" fill="#ece0ca"/>
      <circle cx="6" cy="-24" r="15" fill="#f1e8d6"/>
      <circle cx="14" cy="-2" r="12" fill="#e6d9c1"/>
    </g>
  </defs>

  <!-- back wall -->
  <rect x="0" y="0" width="1920" height="700" fill="url(#wall)"/>
  <rect x="0" y="0" width="1920" height="700" filter="url(#grain)" opacity="0.5"/>

  <!-- stained-glass windows -->
  <g>
    <ellipse cx="560" cy="430" rx="160" ry="280" fill="#fff2d2" opacity="0.55" filter="url(#b24)"/>
    <path d="M467 640 L467 262 A93 93 0 0 1 653 262 L653 640 Z" fill="#3f3a2e"/>
    <g clip-path="url(#clipL)">
      <clipPath id="clipL"><path d="M475 640 L475 266 A85 85 0 0 1 645 266 L645 640 Z"/></clipPath>
      <rect x="475" y="175" width="170" height="95" fill="#d8b873"/>
      <rect x="475" y="268" width="170" height="90" fill="#8ea9c9"/>
      <rect x="475" y="356" width="170" height="96" fill="#9ab884"/>
      <rect x="475" y="450" width="170" height="94" fill="#d49e90"/>
      <rect x="475" y="542" width="170" height="98" fill="#e4d6ac"/>
      <ellipse cx="560" cy="400" rx="58" ry="150" fill="#fff8e2" opacity="0.5" filter="url(#b14)"/>
      <path d="M475 640 L475 266 A85 85 0 0 1 645 266 L645 640 Z" fill="url(#lead)"/>
    </g>
    <path d="M475 640 L475 266 A85 85 0 0 1 645 266 L645 640 Z" fill="none" stroke="#d8cbaa" stroke-width="9"/>
  </g>
  <g>
    <ellipse cx="1360" cy="430" rx="160" ry="280" fill="#fff2d2" opacity="0.55" filter="url(#b24)"/>
    <path d="M1267 640 L1267 262 A93 93 0 0 1 1453 262 L1453 640 Z" fill="#3f3a2e"/>
    <g clip-path="url(#clipR)">
      <clipPath id="clipR"><path d="M1275 640 L1275 266 A85 85 0 0 1 1445 266 L1445 640 Z"/></clipPath>
      <rect x="1275" y="175" width="170" height="95" fill="#d8b873"/>
      <rect x="1275" y="268" width="170" height="90" fill="#9ab884"/>
      <rect x="1275" y="356" width="170" height="96" fill="#8ea9c9"/>
      <rect x="1275" y="450" width="170" height="94" fill="#e4d6ac"/>
      <rect x="1275" y="542" width="170" height="98" fill="#d49e90"/>
      <ellipse cx="1360" cy="400" rx="58" ry="150" fill="#fff8e2" opacity="0.5" filter="url(#b14)"/>
      <path d="M1275 640 L1275 266 A85 85 0 0 1 1445 266 L1445 640 Z" fill="url(#lead)"/>
    </g>
    <path d="M1275 640 L1275 266 A85 85 0 0 1 1445 266 L1445 640 Z" fill="none" stroke="#d8cbaa" stroke-width="9"/>
  </g>

  <!-- alcove + cross -->
  <path d="M748 648 L748 320 A212 212 0 0 1 1172 320 L1172 648 Z" fill="#241f16" opacity="0.45" filter="url(#b6)"/>
  <path d="M760 644 L760 320 A200 200 0 0 1 1160 320 L1160 644 Z" fill="url(#alcove)"/>
  <path d="M778 644 L778 324 A182 182 0 0 1 1142 324 L1142 644 Z" fill="none" stroke="#b39152" stroke-width="4" opacity="0.75"/>
  <ellipse cx="960" cy="390" rx="120" ry="160" fill="#fff3d0" opacity="0.5" filter="url(#b24)"/>
  <g>
    <rect x="948" y="298" width="24" height="212" rx="4" fill="url(#gold)" stroke="#7c6132" stroke-width="1.5"/>
    <rect x="890" y="352" width="140" height="22" rx="4" fill="url(#gold)" stroke="#7c6132" stroke-width="1.5"/>
  </g>

  <!-- pendant lights -->
  <g stroke="#2b2620" stroke-width="2">
    <line x1="700" y1="0" x2="700" y2="140"/>
    <line x1="1220" y1="0" x2="1220" y2="140"/>
    <line x1="858" y1="0" x2="858" y2="104"/>
    <line x1="1062" y1="0" x2="1062" y2="104"/>
  </g>
  <g>
    <polygon points="686,166 714,166 706,138 694,138" fill="url(#gold)"/>
    <ellipse cx="700" cy="176" rx="24" ry="12" fill="#ffd9a3" opacity="0.5" filter="url(#b6)"/>
    <circle cx="700" cy="170" r="4.5" fill="#fff0cc"/>
    <polygon points="1206,166 1234,166 1226,138 1214,138" fill="url(#gold)"/>
    <ellipse cx="1220" cy="176" rx="24" ry="12" fill="#ffd9a3" opacity="0.5" filter="url(#b6)"/>
    <circle cx="1220" cy="170" r="4.5" fill="#fff0cc"/>
    <polygon points="848,124 868,124 862,104 854,104" fill="url(#gold)"/>
    <circle cx="858" cy="128" r="3.4" fill="#fff0cc"/>
    <polygon points="1052,124 1072,124 1066,104 1058,104" fill="url(#gold)"/>
    <circle cx="1062" cy="128" r="3.4" fill="#fff0cc"/>
  </g>

  <!-- floor -->
  <rect x="0" y="640" width="1920" height="440" fill="url(#floor)"/>
  <g stroke="#4a3c26" opacity="0.1">
    <line x1="0" y1="664" x2="1920" y2="664"/>
    <line x1="0" y1="702" x2="1920" y2="702"/>
    <line x1="0" y1="752" x2="1920" y2="752"/>
    <line x1="0" y1="814" x2="1920" y2="814"/>
    <line x1="0" y1="890" x2="1920" y2="890"/>
    <line x1="0" y1="980" x2="1920" y2="980"/>
  </g>
  <ellipse cx="560" cy="705" rx="110" ry="30" fill="#cdd6c0" opacity="0.16" filter="url(#b14)"/>
  <ellipse cx="1360" cy="705" rx="110" ry="30" fill="#c9d2c4" opacity="0.16" filter="url(#b14)"/>
  <rect x="0" y="638" width="1920" height="6" fill="#3a3122" opacity="0.35"/>

  <ellipse cx="960" cy="740" rx="430" ry="170" fill="#ffedc4" opacity="0.16" filter="url(#b24)"/>
  <!-- aisle runner -->
  <polygon points="895,648 1025,648 1250,1080 670,1080" fill="url(#runner)"/>
  <polygon points="895,648 913,648 760,1080 670,1080" fill="#c9b891" opacity="0.5"/>
  <polygon points="1007,648 1025,648 1250,1080 1160,1080" fill="#c9b891" opacity="0.5"/>
  <line x1="895" y1="648" x2="670" y2="1080" stroke="#b39152" stroke-width="3" opacity="0.4"/>
  <line x1="1025" y1="648" x2="1250" y2="1080" stroke="#b39152" stroke-width="3" opacity="0.4"/>

  <!-- dais + altar table -->
  <ellipse cx="960" cy="655" rx="290" ry="18" fill="#1d1406" opacity="0.3" filter="url(#b6)"/>
  <polygon points="740,586 1180,586 1212,614 708,614" fill="#e7dbbd"/>
  <polygon points="708,614 1212,614 1212,650 708,650" fill="#c3ae87"/>
  <g>
    <rect x="878" y="522" width="164" height="82" rx="6" fill="url(#cloth)"/>
    <line x1="912" y1="530" x2="906" y2="600" stroke="#b7a888" stroke-width="2" opacity="0.35"/>
    <line x1="960" y1="530" x2="960" y2="600" stroke="#b7a888" stroke-width="2" opacity="0.3"/>
    <line x1="1010" y1="530" x2="1016" y2="600" stroke="#b7a888" stroke-width="2" opacity="0.35"/>
    <rect x="903" y="478" width="5" height="44" fill="url(#gold)"/>
    <use href="#flame" transform="translate(905.5,470) scale(0.8)"/>
    <rect x="1012" y="478" width="5" height="44" fill="url(#gold)"/>
    <use href="#flame" transform="translate(1014.5,470) scale(0.8)"/>
    <ellipse cx="960" cy="524" rx="34" ry="9" fill="#7c8d6a"/>
    <ellipse cx="960" cy="521" rx="24" ry="6" fill="#93a37e"/>
  </g>

  <!-- dais florals on pedestals -->
  <g>
    <polygon points="778,530 802,530 808,648 772,648" fill="url(#alcove)" stroke="#c3ae87" stroke-width="1.5"/>
    <use href="#bouquet" transform="translate(790,486)"/>
    <polygon points="1118,530 1142,530 1148,648 1112,648" fill="url(#alcove)" stroke="#c3ae87" stroke-width="1.5"/>
    <use href="#bouquet" transform="translate(1130,486)"/>
    <use href="#bouquet" transform="translate(722,610) scale(0.62)"/>
    <use href="#bouquet" transform="translate(1198,610) scale(0.62)"/>
  </g>

  <!-- pews (far to near) -->
  <g>
    <use href="#pew" transform="translate(558,650) scale(0.40)"/>
    <use href="#pew" transform="translate(460,688) scale(0.50)"/>
    <use href="#pew" transform="translate(334,736) scale(0.63)"/>
    <use href="#pew" transform="translate(170,798) scale(0.80)"/>
    <use href="#pew" transform="translate(-22,876) scale(1.00)"/>
    <use href="#pew" transform="translate(-270,970) scale(1.26)" filter="url(#b2)"/>
  </g>
  <g transform="translate(1920,0) scale(-1,1)">
    <use href="#pew" transform="translate(558,650) scale(0.40)"/>
    <use href="#pew" transform="translate(460,688) scale(0.50)"/>
    <use href="#pew" transform="translate(334,736) scale(0.63)"/>
    <use href="#pew" transform="translate(170,798) scale(0.80)"/>
    <use href="#pew" transform="translate(-22,876) scale(1.00)"/>
    <use href="#pew" transform="translate(-270,970) scale(1.26)" filter="url(#b2)"/>
  </g>

  <!-- aisle-end posies + candles -->
  <g>
    <rect x="809" y="706" width="4" height="32" fill="url(#gold)"/>
    <use href="#flame" transform="translate(811,698) scale(0.7)"/>
    <use href="#posy" transform="translate(811,742) scale(0.72)"/>
    <rect x="776" y="764" width="5" height="38" fill="url(#gold)"/>
    <use href="#flame" transform="translate(778.5,755) scale(0.85)"/>
    <use href="#posy" transform="translate(779,806) scale(0.88)"/>
    <rect x="737" y="836" width="6" height="44" fill="url(#gold)"/>
    <use href="#flame" transform="translate(740,826)"/>
    <use href="#posy" transform="translate(740,884)"/>
  </g>
  <g transform="translate(1920,0) scale(-1,1)">
    <rect x="809" y="706" width="4" height="32" fill="url(#gold)"/>
    <use href="#flame" transform="translate(811,698) scale(0.7)"/>
    <use href="#posy" transform="translate(811,742) scale(0.72)"/>
    <rect x="776" y="764" width="5" height="38" fill="url(#gold)"/>
    <use href="#flame" transform="translate(778.5,755) scale(0.85)"/>
    <use href="#posy" transform="translate(779,806) scale(0.88)"/>
    <rect x="737" y="836" width="6" height="44" fill="url(#gold)"/>
    <use href="#flame" transform="translate(740,826)"/>
    <use href="#posy" transform="translate(740,884)"/>
  </g>

  <!-- atmosphere: depth haze, light shafts, dust -->
  <ellipse cx="960" cy="620" rx="720" ry="150" fill="#ecdfc4" opacity="0.15" filter="url(#b24)"/>
  <g filter="url(#b14)">
    <polygon points="500,130 596,130 900,1080 580,1080" fill="url(#shaft)" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.65;0.5;0.6;0.55" dur="9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1324,130 1420,130 1340,1080 1020,1080" fill="url(#shaft)" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.48;0.64;0.52;0.55" dur="11s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="880,60 990,60 1120,760 830,760" fill="url(#shaft)" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.48;0.34;0.44;0.4" dur="13s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g fill="#fff6de" filter="url(#b2)">
    <g opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0 0; 8 -46; 0 -92" dur="26s" repeatCount="indefinite"/>
      <circle cx="640" cy="560" r="2.4" opacity="0.3"/>
      <circle cx="700" cy="700" r="1.8" opacity="0.22"/>
      <circle cx="560" cy="820" r="2.8" opacity="0.26"/>
      <circle cx="1300" cy="600" r="2.2" opacity="0.3"/>
      <circle cx="1240" cy="760" r="1.7" opacity="0.2"/>
      <circle cx="1380" cy="880" r="2.6" opacity="0.24"/>
      <circle cx="940" cy="480" r="2" opacity="0.26"/>
      <circle cx="1010" cy="640" r="1.6" opacity="0.2"/>
    </g>
    <g opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0 46; 8 0; 0 -46" dur="26s" repeatCount="indefinite"/>
      <circle cx="600" cy="640" r="1.9" opacity="0.24"/>
      <circle cx="760" cy="540" r="2.3" opacity="0.28"/>
      <circle cx="1330" cy="700" r="2" opacity="0.26"/>
      <circle cx="1180" cy="560" r="1.6" opacity="0.2"/>
      <circle cx="900" cy="580" r="2.4" opacity="0.24"/>
    </g>
  </g>

  <!-- grade -->
  <rect x="0" y="0" width="1920" height="240" fill="url(#topGrade)"/>
  <rect x="0" y="860" width="1920" height="220" fill="url(#bottomGrade)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vig)"/>
</svg>
