name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via the deployment token.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          NEXT_OUTPUT_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: "/wedding-flow-studio"
      # Skip Jekyll so the _next/ directory is served as-is.
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
